# Smithery configuration file: https://smithery.ai/docs/build/project-config

runtime: container

startCommand:
  type: http
  configSchema:
    # JSON Schema defining the configuration options for the MCP.
    type: object
    required:
      - refApiKey
    properties:
      refApiKey:
        type: string
        title: "Ref API Key"
        description: "API key for Ref MCP server. Get one from https://ref.tools/keys"
      disableSearchWeb:
        type: boolean
        title: "Disable Search Web"
        default: false
        description: "Disable the fallback web search tool"
  exampleConfig:
    refApiKey: "my-dummy-api-key"
    disableSearchWeb: false

build:
  dockerfile: "Dockerfile"
  dockerBuildPath: "."

# Set transport mode for the Smithery.ai environment.
# The Dockerfile no longer hardcodes TRANSPORT=http so that the image
# defaults to stdio for Docker MCP Gateway / Gemini CLI consumers.
# Smithery deploys still need HTTP, declared here at the platform layer.
env:
  TRANSPORT: "http"
